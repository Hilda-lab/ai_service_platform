app:
  name: ai-service-platform
  env: dev
  port: 8080

jwt:
  secret: replace-with-strong-secret
  expire_hours: 72

mysql:
  dsn: ai_user:ai_pass@tcp(127.0.0.1:3307)/ai_platform?charset=utf8mb4&parseTime=True&loc=Local

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

rabbitmq:
  url: amqp://guest:guest@127.0.0.1:5672/

ai:
  provider: openai
  openai:
    api_key: ""
    base_url: https://cdn.12ai.org
    model: gpt-5.1
  gemini:
    api_key: ""
    base_url: https://cdn.12ai.org
    model: gemini-3-pro-preview
  ollama:
    base_url: http://127.0.0.1:11434
    model: llama3.1

rag:
  vector_db_url: ""

vision:
  provider: openai
  model: gpt-4.1-mini
  mock: false
  queue: vision_tasks

speech:
  provider: openai
  tts_model: gpt-4o-mini-tts
  asr_model: whisper-1
  voice: alloy
  language: zh
  mock: false
